<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg_richard_nixon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow_richard_nixon" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg_richard_nixon)" filter="url(#shadow_richard_nixon)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#e74c3c"/>

  <text x="35" y="72" font-size="48">🕵️</text>

  <text x="95" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#ffffff" font-weight="700">Richard Nixon</text>

  <rect x="95" y="68" width="93" height="22" rx="11" fill="#e74c3c" opacity="0.25"/>
  <text x="141.5" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ff7675" text-anchor="middle" font-weight="600">politicians</text>

  <text x="30" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" opacity="0.9">
      <tspan x="30" dy="0">Brilliant, paranoid, and calculating — opened China,</tspan>
      <tspan x="30" dy="18">ended the draft, and then taped himself into a</tspan>
      <tspan x="30" dy="18">constitutional crisis.</tspan>
  </text>

    <rect x="30" y="195" width="70" height="24" rx="12" fill="#e74c3c" opacity="0.2"/>
    <text x="65.0" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ff7675" text-anchor="middle" font-weight="500">politics</text>
    <rect x="108" y="195" width="76" height="24" rx="12" fill="#e74c3c" opacity="0.2"/>
    <text x="146.0" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ff7675" text-anchor="middle" font-weight="500">president</text>
    <rect x="192" y="195" width="70" height="24" rx="12" fill="#e74c3c" opacity="0.2"/>
    <text x="227.0" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ff7675" text-anchor="middle" font-weight="500">cold-war</text>

</svg>
