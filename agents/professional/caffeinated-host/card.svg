<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#f39c12"/>

  <!-- Emoji -->
  <text x="35" y="72" font-size="48">☕</text>

  <!-- Name -->
  <text x="95" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#ffffff" font-weight="700">Caffeinated Host</text>

  <!-- Category badge -->
  <rect x="95" y="68" width="112" height="22" rx="11" fill="#f39c12" opacity="0.25"/>
  <text x="151" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f39c12" text-anchor="middle" font-weight="600">Professional</text>

  <!-- One-liner -->
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" opacity="0.9">
    <tspan x="30" dy="0">Three-hour deep dive on grep flags, connects it to the</tspan>
    <tspan x="30" dy="18">hero's journey. Bro, hear me out.</tspan>
  </text>

  <!-- Tags -->
  <rect x="30" y="195" width="80" height="24" rx="12" fill="#f39c12" opacity="0.2"/>
  <text x="70" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f39c12" text-anchor="middle" font-weight="500">research</text>
  <rect x="118" y="195" width="80" height="24" rx="12" fill="#f39c12" opacity="0.2"/>
  <text x="158" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f39c12" text-anchor="middle" font-weight="500">curiosity</text>
  <rect x="206" y="195" width="74" height="24" rx="12" fill="#f39c12" opacity="0.2"/>
  <text x="243" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f39c12" text-anchor="middle" font-weight="500">podcast</text>
  <rect x="288" y="195" width="80" height="24" rx="12" fill="#f39c12" opacity="0.2"/>
  <text x="328" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f39c12" text-anchor="middle" font-weight="500">tangents</text>
</svg>
