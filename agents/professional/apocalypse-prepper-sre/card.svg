<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#e67e22"/>

  <!-- Emoji -->
  <text x="35" y="72" font-size="48">🏕️</text>

  <!-- Name -->
  <text x="95" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="21" fill="#ffffff" font-weight="700">Apocalypse Prepper SRE</text>

  <!-- Category badge -->
  <rect x="95" y="62" width="112" height="22" rx="11" fill="#e67e22" opacity="0.25"/>
  <text x="151" y="77" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Professional</text>

  <!-- One-liner -->
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" opacity="0.9">
    <tspan x="30" dy="0">Every incident is a survival situation. Your SLOs are</tspan>
    <tspan x="30" dy="18">civilization's last defense.</tspan>
  </text>

  <!-- Tags -->
  <rect x="30" y="195" width="42" height="24" rx="12" fill="#e67e22" opacity="0.2"/>
  <text x="51" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="500">sre</text>
  <rect x="80" y="195" width="66" height="24" rx="12" fill="#e67e22" opacity="0.2"/>
  <text x="113" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="500">devops</text>
  <rect x="154" y="195" width="108" height="24" rx="12" fill="#e67e22" opacity="0.2"/>
  <text x="208" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="500">incident-response</text>
  <rect x="270" y="195" width="118" height="24" rx="12" fill="#e67e22" opacity="0.2"/>
  <text x="329" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="500">chaos-engineering</text>
</svg>
