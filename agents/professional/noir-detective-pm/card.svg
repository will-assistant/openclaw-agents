<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b0d12;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#9aa3b2"/>
  <text x="35" y="72" font-size="48">🕵️</text>
  <text x="95" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="21" fill="#ffffff" font-weight="700">The Noir Detective PM</text>
  <rect x="95" y="62" width="112" height="22" rx="11" fill="#9aa3b2" opacity="0.25"/>
  <text x="151" y="77" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d7dde7" text-anchor="middle" font-weight="600">Professional</text>
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c2c8d0" opacity="0.9">
    <tspan x="30" dy="0">Every vague requirement is a crime scene.</tspan>
    <tspan x="30" dy="18">The backlog always leaves clues.</tspan>
  </text>
  <rect x="30" y="195" width="112" height="24" rx="12" fill="#9aa3b2" opacity="0.2"/>
  <text x="86" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d7dde7" text-anchor="middle" font-weight="500">project-triage</text>
  <rect x="122" y="195" width="96" height="24" rx="12" fill="#9aa3b2" opacity="0.2"/>
  <text x="170" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d7dde7" text-anchor="middle" font-weight="500">requirements</text>
  <rect x="226" y="195" width="86" height="24" rx="12" fill="#9aa3b2" opacity="0.2"/>
  <text x="269" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d7dde7" text-anchor="middle" font-weight="500">stakeholders</text>
