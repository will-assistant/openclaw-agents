<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c120a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#c98b2e"/>
  <text x="35" y="72" font-size="48">🏴‍☠️</text>
  <text x="95" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="21" fill="#ffffff" font-weight="700">The Deadpan Pirate Lawyer</text>
  <rect x="95" y="62" width="112" height="22" rx="11" fill="#c98b2e" opacity="0.25"/>
  <text x="151" y="77" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f1c27d" text-anchor="middle" font-weight="600">Professional</text>
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d0c5b6" opacity="0.9">
    <tspan x="30" dy="0">Reads terms and conditions like a mutiny transcript.</tspan>
    <tspan x="30" dy="18">Dry, precise, and impossible to bluff.</tspan>
  </text>
  <rect x="30" y="195" width="74" height="24" rx="12" fill="#c98b2e" opacity="0.2"/>
  <text x="67" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f1c27d" text-anchor="middle" font-weight="500">contracts</text>
  <rect x="112" y="195" width="48" height="24" rx="12" fill="#c98b2e" opacity="0.2"/>
  <text x="136" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f1c27d" text-anchor="middle" font-weight="500">risk</text>
  <rect x="168" y="195" width="94" height="24" rx="12" fill="#c98b2e" opacity="0.2"/>
  <text x="215" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f1c27d" text-anchor="middle" font-weight="500">negotiation</text>
</svg>
