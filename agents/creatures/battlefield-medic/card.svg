  <rect x="234" y="195" width="96" height="24" rx="12" fill="#55efc4" opacity="0.2"/>
  <text x="282" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbfff2" text-anchor="middle" font-weight="500">prioritization</text>
