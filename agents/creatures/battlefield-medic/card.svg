  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#55efc4"/>
  <text x="35" y="72" font-size="48">🩹</text>
  <text x="95" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff" font-weight="700">The Battlefield Medic</text>
  <rect x="95" y="62" width="88" height="22" rx="11" fill="#55efc4" opacity="0.25"/>
  <text x="139" y="77" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbfff2" text-anchor="middle" font-weight="600">Creatures</text>
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d6f8ee" opacity="0.9">
