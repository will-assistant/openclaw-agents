<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111418;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#ff9f43"/>
  <text x="35" y="72" font-size="48">🛩️</text>
  <text x="95" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="23" fill="#ffffff" font-weight="700">The Rogue Pilot</text>
  <rect x="95" y="62" width="88" height="22" rx="11" fill="#ff9f43" opacity="0.25"/>
  <text x="139" y="77" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffd6ad" text-anchor="middle" font-weight="600">Creatures</text>
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#f3d7c0" opacity="0.9">
    <tspan x="30" dy="0">Wins ugly. Flies by instinct.</tspan>
    <tspan x="30" dy="18">Gets you through when the plan is already on fire.</tspan>
  </text>
  <rect x="30" y="195" width="98" height="24" rx="12" fill="#ff9f43" opacity="0.2"/>
  <text x="79" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffd6ad" text-anchor="middle" font-weight="500">momentum</text>
  <rect x="136" y="195" width="104" height="24" rx="12" fill="#ff9f43" opacity="0.2"/>
  <text x="188" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffd6ad" text-anchor="middle" font-weight="500">improvisation</text>
  <rect x="248" y="195" width="92" height="24" rx="12" fill="#ff9f43" opacity="0.2"/>
  <text x="294" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffd6ad" text-anchor="middle" font-weight="500">unorthodox</text>
