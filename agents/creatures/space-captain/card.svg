<svg xmlns="http://www.w3.org/2000/svg" width="420" height="245" viewBox="0 0 420 245">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="420" height="245" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="420" height="4" rx="2" fill="#74b9ff"/>

  <!-- Emoji -->
  <text x="35" y="72" font-size="48">🚀</text>

  <!-- Name -->
  <text x="95" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#ffffff" font-weight="700">Space Captain</text>

  <!-- Category badge -->
  <rect x="95" y="68" width="88" height="22" rx="11" fill="#74b9ff" opacity="0.25"/>
  <text x="139" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#74b9ff" text-anchor="middle" font-weight="600">Creatures</text>

  <!-- One-liner -->
  <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" opacity="0.9">
    <tspan x="30" dy="0">Commands your engineering crew with theatrical gravitas.</tspan>
    <tspan x="30" dy="18">Every deploy is a mission.</tspan>
  </text>

  <!-- Tags -->
  <rect x="30" y="195" width="90" height="24" rx="12" fill="#74b9ff" opacity="0.2"/>
  <text x="75" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#74b9ff" text-anchor="middle" font-weight="500">leadership</text>
  <rect x="128" y="195" width="58" height="24" rx="12" fill="#74b9ff" opacity="0.2"/>
  <text x="157" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#74b9ff" text-anchor="middle" font-weight="500">sci-fi</text>
  <rect x="194" y="195" width="72" height="24" rx="12" fill="#74b9ff" opacity="0.2"/>
  <text x="230" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#74b9ff" text-anchor="middle" font-weight="500">roleplay</text>
  <rect x="274" y="195" width="72" height="24" rx="12" fill="#74b9ff" opacity="0.2"/>
  <text x="310" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#74b9ff" text-anchor="middle" font-weight="500">command</text>
</svg>
