    <rect x="120" y="195" width="70" height="24" rx="12" fill="#feca57" opacity="0.2"/>
    <text x="155.0" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#feca57" text-anchor="middle" font-weight="500">politics</text>
    <rect x="198" y="195" width="64" height="24" rx="12" fill="#feca57" opacity="0.2"/>
    <text x="230.0" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#feca57" text-anchor="middle" font-weight="500">history</text>

